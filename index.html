<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>图表工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:20px}
h1{font-size:1.4em;color:#333}
.cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}

.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.14)}
.card .icon{font-size:2.4em;margin-bottom:10px}
.card h2{font-size:1.05em;margin-bottom:6px}
.card p{font-size:0.78em;color:#888}
</style>
</head>
<body>
<h1>📊 图表工具集</h1>
<div class="cards">
  <a class="card" href="波浪图工具/index.html">
    <div class="icon">🌊</div>
    <h2>波浪图编辑器</h2>
    <p>表格波浪 · 拖拽编辑 · 三线表</p>
  </a>
  <a class="card" href="3D山岭图工具/index.html">
    <div class="icon">⛰️</div>
    <h2>3D山岭图生成器</h2>
    <p>交互式3D山脊图 · Meta分析</p>
  </a>
  <a class="card" href="小提琴图工具/index.html">
    <div class="icon">🎻</div>
    <h2>小提琴图生成器</h2>
    <p>Violin Plot · 核密度分布</p>
  </a>
  <a class="card" href="云雨图工具/index.html">
    <div class="icon">🌧️</div>
    <h2>云雨图生成器</h2>
    <p>Rain Cloud Plot · 半小提琴+箱线+散点</p>
  </a>
</div>
</body>
</html>
